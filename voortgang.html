<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ZIVRA — Voortgang</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <script src="data.js"></script>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .vg-controls{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:28px;align-items:center;}
    .vg-btn-group{display:flex;gap:6px;}
    .vg-btn{padding:7px 16px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);color:var(--text-muted);font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;transition:all 0.15s;}
    .vg-btn:hover{border-color:var(--border2);color:var(--text);}
    .vg-btn.active{background:rgba(78,205,196,0.12);border-color:var(--accent);color:var(--accent);}
    .vg-lbl{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.08em;margin-right:4px;}
    .vg-date-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
    .vg-date-input{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:7px 12px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;transition:border-color 0.15s;}
    .vg-date-input:hover,.vg-date-input:focus{border-color:var(--accent);outline:none;}
    .vg-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px;}
    @media(max-width:800px){.vg-grid{grid-template-columns:1fr;}}
    .vg-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:20px;}
    .vg-card.full{grid-column:1/-1;}
    .vg-card-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--text);margin-bottom:2px;}
    .vg-card-sub{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted);margin-bottom:14px;}
    .vg-kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
    @media(max-width:700px){.vg-kpi-row{grid-template-columns:1fr 1fr;}}
    .vg-kpi{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;}
    .vg-kpi-val{font-family:'DM Mono',monospace;font-size:26px;font-weight:700;margin-bottom:4px;}
    .vg-kpi-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;}
    .vg-kpi-delta{font-family:'DM Mono',monospace;font-size:11px;margin-top:3px;}
    .vg-empty{text-align:center;padding:48px;color:var(--text-muted);font-family:'DM Mono',monospace;font-size:13px;}
  </style>
</head>
<body>
<header class="site-header">
  <div class="header-inner">
    <a href="index.html" class="logo-block"><span class="logo-mark">Z</span><div><div class="logo-text">ZIVRA</div><div class="logo-sub">Bewegingsrevalidatie</div></div></a>
    <nav class="main-nav">
      <a href="index.html" class="nav-link">Dashboard</a>
      <a href="patient.html" class="nav-link">Patiënt</a>
      <a href="sessies.html" class="nav-link">Sessies</a>
      <a href="voortgang.html" class="nav-link active">Voortgang</a>
    </nav>
    <div class="patient-selector" id="patientSelector">
      <div class="ps-trigger" id="psTrigger"><span class="ps-avatar" id="psAvatar">V</span><div class="ps-info"><div class="ps-name" id="psName">Varisha Doggen</div><div class="ps-id" id="psId">#329500</div></div><svg class="ps-chevron" viewBox="0 0 16 16"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg></div>
      <div class="ps-dropdown" id="psDropdown"><div class="ps-search-wrap"><input class="ps-search" id="psSearch" type="text" placeholder="Zoek patiënt…"/></div><div class="ps-list" id="psList"></div></div>
    </div>
    <div class="meta-chip live-chip"><span class="live-dot"></span>Analyse actief</div>
  </div>
</header>

<div class="page-hero">
  <div class="page-hero-inner">
    <div class="page-hero-label">Voortgang</div>
    <h1 class="page-hero-title" id="pageTitle">Voortgang</h1>
    <p class="page-hero-desc" id="pageDesc">Selecteer spel en periode.</p>
  </div>
</div>

<section>
  <div class="section-inner">

    <div class="vg-controls">
      <span class="vg-lbl">Spel:</span>
      <div class="vg-btn-group" id="gameFilter">
        <button class="vg-btn active" data-game="all">Alles</button>
        <button class="vg-btn" data-game="sym">Symmetrie</button>
        <button class="vg-btn" data-game="holomoves">🎮 Holomoves</button>
        <button class="vg-btn" data-game="blokki">🧱 Blokki</button>
        <button class="vg-btn" data-game="ketel">🫙 Ketel</button>
      </div>
    </div>

    <div class="vg-controls" style="margin-bottom:32px">
      <span class="vg-lbl">Periode:</span>
      <div class="vg-date-row">
        <label style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted)">Van sessie</label>
        <input type="number" id="fromSessie" min="1" value="1" class="vg-date-input" style="width:70px"/>
        <label style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted)">tot sessie</label>
        <input type="number" id="toSessie" min="1" value="99" class="vg-date-input" style="width:70px"/>
        <button class="vg-btn" id="resetPeriode">Reset</button>
        <span id="periodeInfo" style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text-dim)"></span>
      </div>
    </div>

    <div class="vg-kpi-row" id="vgKpis"></div>
    <div class="vg-grid" id="vgGrid"></div>
    <div class="insight-box" id="insightBox" style="margin-top:24px"></div>

  </div>
</section>

<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-logo">ZIVRA <span>Bewegingsrevalidatie</span></div>
    <div class="footer-links"><a href="index.html">Dashboard</a><a href="patient.html">Patiënt</a><a href="sessies.html">Sessies</a><a href="voortgang.html">Voortgang</a></div>
    <div class="footer-note">IMU data — 2026</div>
  </div>
</footer>

<script>
var currentNr  = localStorage.getItem('zivra_patient') || ALL_PATIENTS_META[0].nr;
var activeGame = 'all';

// ── Patient selector ─────────────────────────────────────────
function buildPatientList() {
  var list = document.getElementById('psList');
  ALL_PATIENTS_META.forEach(function(p) {
    var el = document.createElement('div');
    el.className = 'ps-item'; el.dataset.nr = p.nr;
    el.innerHTML = '<span class="ps-item-avatar">'+p.naam[0]+'</span><div class="ps-item-info"><div class="ps-item-name">'+p.naam+'</div><div class="ps-item-meta">#'+p.nr+' · '+p.kliniek+'</div></div><span class="ps-item-caras">'+p.caras+'</span>';
    el.addEventListener('click', function(){selectPatient(p.nr);closeDropdown();});
    list.appendChild(el);
  });
}
function openDropdown(){document.getElementById('psDropdown').classList.add('open');document.getElementById('psSearch').focus();}
function closeDropdown(){document.getElementById('psDropdown').classList.remove('open');document.getElementById('psSearch').value='';filterList('');}
document.getElementById('psTrigger').addEventListener('click',function(e){e.stopPropagation();document.getElementById('psDropdown').classList.contains('open')?closeDropdown():openDropdown();});
document.addEventListener('click',function(e){if(!document.getElementById('patientSelector').contains(e.target))closeDropdown();});
document.getElementById('psSearch').addEventListener('input',function(e){filterList(e.target.value.toLowerCase());});
function filterList(q){document.querySelectorAll('.ps-item').forEach(function(el){el.style.display=el.textContent.toLowerCase().includes(q)?'':'none';});}

// ── Game filter ───────────────────────────────────────────────
document.getElementById('gameFilter').addEventListener('click', function(e) {
  var b = e.target.closest('.vg-btn'); if (!b) return;
  document.querySelectorAll('#gameFilter .vg-btn').forEach(function(x){x.classList.remove('active');});
  b.classList.add('active'); activeGame = b.dataset.game; rebuild();
});

// ── Periode controls ──────────────────────────────────────────
document.getElementById('fromSessie').addEventListener('input', rebuild);
document.getElementById('toSessie').addEventListener('input', rebuild);
document.getElementById('resetPeriode').addEventListener('click', function() {
  document.getElementById('fromSessie').value = '1';
  document.getElementById('toSessie').value = '99';
  rebuild();
});

// ── Filter sessions by sessie number range ─────────────────────
function filterSessions(ss) {
  var from = parseInt(document.getElementById('fromSessie').value) || 1;
  var to   = parseInt(document.getElementById('toSessie').value)   || 99;
  return ss.filter(function(s){ return s.sessie >= from && s.sessie <= to; });
}

// ── D3 helpers ────────────────────────────────────────────────
function makeSvg(id, h) {
  var el = document.getElementById(id);
  if (!el) return null;
  el.innerHTML = '';
  var m = {top:16,right:18,bottom:30,left:48};
  var W = el.clientWidth || 460;
  var H = h;
  var w = W-m.left-m.right, ch = H-m.top-m.bottom;
  var svg = d3.select(el).append('svg').attr('width',W).attr('height',H);
  var g = svg.append('g').attr('transform','translate('+m.left+','+m.top+')');
  return {g:g,w:w,h:ch};
}
function addGrid(g,ySc,w){
  g.append('g').call(d3.axisLeft(ySc).ticks(4).tickSize(-w).tickFormat(''))
    .selectAll('line').style('stroke','rgba(255,255,255,0.05)').style('stroke-dasharray','3,3');
  g.select('.domain').remove();
}
function addAxes(g,xSc,ySc,h,yFmt){
  g.append('g').attr('transform','translate(0,'+h+')').call(d3.axisBottom(xSc).tickSize(0))
    .selectAll('text').style('fill','#555').style('font-family',"'DM Mono',monospace").style('font-size','10px');
  g.append('g').call(d3.axisLeft(ySc).ticks(4).tickFormat(yFmt||String))
    .selectAll('text').style('fill','#555').style('font-family',"'DM Mono',monospace").style('font-size','10px');
  g.selectAll('.domain,.tick line').style('stroke','rgba(255,255,255,0.08)');
}
function dCol(cur,prev,inv){
  if(prev==null) return '#64748b';
  var d = inv ? prev-cur : cur-prev;
  return d>2?'#00B894':d>=-2?'#FDCB6E':'#ff7675';
}
function parseScore(v){
  if(!v||String(v).indexOf('/')===-1) return 0;
  var p=String(v).split('/'); return p[1]>0?Math.round(p[0]/p[1]*100):0;
}

// Generic line chart
function lineChart(id, labels, datasets, h, yFmt) {
  var d = makeSvg(id, h||220); if (!d) return;
  var g=d.g, w=d.w, ch=d.h;
  var allV = [];
  datasets.forEach(function(ds){ ds.data.forEach(function(v){ if(v!=null) allV.push(v); }); });
  if (!allV.length) return;
  var yMin = Math.max(0, d3.min(allV)*0.88);
  var yMax = d3.max(allV)*1.1||10;
  var xSc = d3.scalePoint().domain(labels).range([0,w]);
  var ySc = d3.scaleLinear().domain([yMin,yMax]).range([ch,0]);
  addGrid(g,ySc,w);

  datasets.forEach(function(ds) {
    if (ds.refLine) {
      var ry = ySc(ds.refLine);
      if (ry>=0&&ry<=ch){
        g.append('line').attr('x1',0).attr('y1',ry).attr('x2',w).attr('y2',ry)
          .style('stroke',ds.color+'55').style('stroke-dasharray','5,4').style('stroke-width',1.5);
      }
      return;
    }
    if (ds.area) {
      g.append('path').datum(ds.data)
        .attr('fill',ds.color+'22')
        .attr('d',d3.area().x(function(_,i){return xSc(labels[i]);}).y0(ch).y1(function(v){return ySc(v);}).curve(d3.curveCatmullRom));
    }
    g.append('path').datum(ds.data)
      .attr('fill','none').attr('stroke',ds.color).attr('stroke-width',ds.width||2.5)
      .style('stroke-dasharray',ds.dash||'none')
      .attr('d',d3.line().x(function(_,i){return xSc(labels[i]);}).y(function(v){return ySc(v);}).curve(d3.curveCatmullRom));
    ds.data.forEach(function(v,i){
      var col = ds.delta ? dCol(v,i>0?ds.data[i-1]:null,ds.inv||false) : ds.color;
      g.append('circle').attr('cx',xSc(labels[i])).attr('cy',ySc(v)).attr('r',ds.r||5)
        .attr('fill',col).attr('stroke','#0a0b0f').attr('stroke-width',1.5);
    });
  });

  // Legend
  var showLeg = datasets.filter(function(ds){return !ds.refLine && ds.label;});
  if (showLeg.length > 1) {
    var leg = g.append('g').attr('transform','translate(0,-2)');
    showLeg.forEach(function(ds,i){
      leg.append('rect').attr('x',i*100).attr('width',10).attr('height',3).attr('fill',ds.color).attr('rx',1);
      leg.append('text').attr('x',i*100+14).attr('y',4).text(ds.label).style('fill','#888').style('font-size','9px').style('font-family',"'DM Mono',monospace");
    });
  }
  addAxes(g,xSc,ySc,ch,yFmt);
}

function barChart(id, labels, vals, colorFn, h, yFmt) {
  var d = makeSvg(id,h||220); if(!d) return;
  var g=d.g, w=d.w, ch=d.h;
  var mx = d3.max(vals)*1.15||10;
  var xSc = d3.scaleBand().domain(labels).range([0,w]).padding(0.3);
  var ySc = d3.scaleLinear().domain([0,mx]).range([ch,0]);
  addGrid(g,ySc,w);
  g.selectAll('.b').data(vals).enter().append('rect')
    .attr('x',function(_,i){return xSc(labels[i]);})
    .attr('y',function(v){return ySc(v);})
    .attr('width',xSc.bandwidth()).attr('height',function(v){return ch-ySc(v);})
    .attr('fill',function(v,i){return colorFn(v,i)+'BB';}).attr('stroke',function(v,i){return colorFn(v,i);})
    .attr('stroke-width',1.5).attr('rx',4);
  vals.forEach(function(v,i){
    g.append('text').attr('x',xSc(labels[i])+xSc.bandwidth()/2).attr('y',ySc(v)-4)
      .attr('text-anchor','middle').text(yFmt?yFmt(v):v)
      .style('fill','#888').style('font-size','10px').style('font-family',"'DM Mono',monospace");
  });
  addAxes(g,xSc,ySc,ch,yFmt);
}

// ── Card helper ───────────────────────────────────────────────
function addCard(id, title, sub, full) {
  var grid = document.getElementById('vgGrid');
  var div  = document.createElement('div');
  div.className = 'vg-card'+(full?' full':'');
  div.innerHTML = '<div class="vg-card-title">'+title+'</div><div class="vg-card-sub">'+sub+'</div><div id="'+id+'" style="height:220px"></div>';
  grid.appendChild(div);
}

// ── Main rebuild ──────────────────────────────────────────────
function rebuild() {
  var p     = ALL_PATIENTS_META.find(function(x){return x.nr===currentNr;});
  var allSS = ALL_SESSIONS[currentNr]||[];
  var ss    = filterSessions(allSS);

  // Update periode info
  var fromV = parseInt(document.getElementById('fromSessie').value)||1;
  var toV   = parseInt(document.getElementById('toSessie').value)||99;
  var actualTo = Math.min(toV, allSS.length);
  document.getElementById('periodeInfo').textContent =
    ss.length > 0 ? ('Sessie '+ss[0].sessie+' – '+ss[ss.length-1].sessie+' ('+ss.length+' van '+allSS.length+' sessies)') : 'Geen sessies in range';

  // ── KPIs ──
  var first = allSS[0]||{}, last = allSS[allSS.length-1]||{};
  var symD  = (typeof last.sym_index==='number'&&typeof first.sym_index==='number') ? last.sym_index-first.sym_index : 0;
  var pijnD = (typeof last.pijn==='number'&&typeof first.pijn==='number') ? last.pijn-first.pijn : 0;
  var enerD = (typeof last.energie==='number'&&typeof first.energie==='number') ? last.energie-first.energie : 0;
  var ketelAvg = ss.length ? Math.round(ss.reduce(function(acc,x){ return acc+(x.ketel_aangeboden?x.ketel_correct/x.ketel_aangeboden*100:0); },0)/ss.length) : 0;

  var kpis = [
    {val:(last.pijn||'—')+'/10',    label:'Pijnscore nu',   delta:pijnD, unit:'/10', inv:true,  color:'#ff7675'},
    {val:(last.energie||'—')+'/10', label:'Energie nu',     delta:enerD, unit:'/10', inv:false, color:'#00B894'},
    {val:ketelAvg+'%',              label:'Ketel score gem.', delta:0,   unit:'',    inv:false, color:'#FDCB6E'},
    {val:(last.sym_index||'—')+'%', label:'Symmetrie nu',   delta:symD,  unit:'pp',  inv:false, color:'#4ECDC4'},
  ];
  document.getElementById('vgKpis').innerHTML = kpis.map(function(k){
    var good = k.inv?k.delta<0:k.delta>0;
    var col  = k.delta===0?'#7a7f8e':good?'#00B894':'#ff7675';
    var sign = k.delta>0?'+':'';
    return '<div class="vg-kpi"><div class="vg-kpi-val" style="color:'+k.color+'">'+k.val+'</div><div class="vg-kpi-label">'+k.label+'</div>'+(k.delta!==0?'<div class="vg-kpi-delta" style="color:'+col+'">'+sign+k.delta+k.unit+' t.o.v. S1</div>':'')+'</div>';
  }).join('');

  document.getElementById('vgGrid').innerHTML = '';

  if (!ss.length) {
    document.getElementById('vgGrid').innerHTML = '<div class="vg-card full"><div class="vg-empty">Geen sessies in de geselecteerde range.<br>Pas de sessienummers aan.</div></div>';
    document.getElementById('insightBox').innerHTML = '';
    return;
  }

  var labels = ss.map(function(s){return 'S'+s.sessie;});
  var lIsAan = p.zijde === 'Links';
  var sess1  = allSS[0]||{};
  var gyrGezRef = lIsAan ? (sess1.gyr_rechts||0) : (sess1.gyr_links||0);

  // ── Symmetrie ──
  if (activeGame === 'all' || activeGame === 'sym') {
    addCard('c-sym','Symmetrie-index verloop','Punten = delta t.o.v. vorige sessie · Stippellijn = gezonde zijde referentie');
    lineChart('c-sym', labels, [
      {data:Array(labels.length).fill(100), color:'rgba(255,255,255,0.25)', width:1.5, dash:'6,4', label:null, refLine:null},
      {data:ss.map(function(s){return s.sym_index;}), color:'#4ECDC4', area:true, delta:true, label:'Symmetrie-index'},
    ], 220, function(v){return v+'%';});
  }

  // ── Welzijn ──
  if (activeGame === 'all' || activeGame === 'sym') {
    addCard('c-wb','Welzijn — pijn, frustratie & energie','Pijn/frustratie lager = beter · Energie hoger = beter');
    lineChart('c-wb', labels, [
      {data:ss.map(function(s){return s.pijn;}),       color:'#ff7675', delta:true, inv:true,  label:'Pijn'},
      {data:ss.map(function(s){return s.frustratie;}), color:'#FDCB6E', delta:true, inv:true,  label:'Frustratie'},
      {data:ss.map(function(s){return s.energie;}),    color:'#00B894', delta:true, inv:false, label:'Energie'},
    ], 220, function(v){return v+'/10';});
  }

  // ── Gyroscoop ──
  if (activeGame === 'all' || activeGame === 'sym') {
    addCard('c-gyr', 'Gyroscoop — '+p.zijde+' (aangedaan) vs '+(lIsAan?'Rechts':'Links')+' (gezond)', 'Hoe dichter bij elkaar, hoe beter het herstel');
    lineChart('c-gyr', labels, [
      {data:ss.map(function(s){return lIsAan?s.gyr_links:s.gyr_rechts;}),  color:'#ff7675', area:true, delta:true, label:p.zijde+' (aangedaan)'},
      {data:ss.map(function(s){return lIsAan?s.gyr_rechts:s.gyr_links;}),  color:'#64748b', dash:'4,3', r:4, label:(lIsAan?'Rechts':'Links')+' (gezond)', width:2},
    ], 220, function(v){return v+'°/s';});
  }

  // ── Holomoves ──
  if (activeGame === 'all' || activeGame === 'holomoves') {
    addCard('c-holo','🎮 Holomoves — reikenscore %','Score als % van maximum per sessie');
    barChart('c-holo', labels, ss.map(function(s){return parseScore(s.reiken);}),
      function(v){return v>=75?'#00B894':v>=50?'#FDCB6E':'#ff7675';}, 220, function(v){return v+'%';});

    addCard('c-holo2','🎮 Holomoves — alle categorieën','Score % per oefencategorie');
    var cats = ['reiken','ROM','hand_los','vrije_ruimte','palmaire_greep'];
    var cLbls = ['Reiken','ROM','Hand los','Vrije ruimte','Palm.'];
    var cols  = ['#4ECDC4','#A29BFE','#FD79A8','#FDCB6E','#00B894'];
    lineChart('c-holo2', labels,
      cats.map(function(c,i){return {data:ss.map(function(s){return parseScore(s[c]);}), color:cols[i], label:cLbls[i], r:4};}),
      220, function(v){return v+'%';});
  }

  // ── Blokki ──
  if (activeGame === 'all' || activeGame === 'blokki') {
    addCard('c-blokki','🧱 Blokki — pijnscore','Lagere pijn tijdens spel = beter draagbaar');
    barChart('c-blokki', labels, ss.map(function(s){return s.blokki_pijn||0;}),
      function(v){return v>6?'#ff7675':v>3?'#FDCB6E':'#00B894';}, 220, function(v){return v+'/10';});
  }

  // ── Ketel ──
  if (activeGame === 'all' || activeGame === 'ketel') {
    addCard('c-ketel','🫙 Magische Ketel — treffscore %','Correct beantwoord als % van aangeboden per sessie');
    barChart('c-ketel', labels, ss.map(function(s){return s.ketel_aangeboden?Math.round(s.ketel_correct/s.ketel_aangeboden*100):0;}),
      function(v){return v>=75?'#00B894':v>=50?'#FDCB6E':'#ff7675';}, 220, function(v){return v+'%';});
  }

  // ── Insight ──
  var trend = allSS.length>=2 ? allSS[allSS.length-1].sym_index-allSS[allSS.length-2].sym_index : 0;
  var trendTxt = trend>2?'📈 Positieve trend':trend<-2?'📉 Lichte terugval':'→ Stabiel t.o.v. vorige sessie';
  document.getElementById('insightBox').innerHTML =
    '<div class="insight-icon">📊</div><div class="insight-text"><strong>Voortgang — '+p.naam+':</strong> ' +
    'Van <strong>'+first.sym_index+'%</strong> → <strong>'+last.sym_index+'%</strong> symmetrie (+'+symD+'pp totaal). '+trendTxt+'. ' +
    'Laatste pijn: <strong>'+last.pijn+'/10</strong>, energie: <strong>'+last.energie+'/10</strong>.' +
    (ss.length!==allSS.length?'<br><em>Toont '+ss.length+' van '+allSS.length+' sessies.</em>':'')+'</div>';
}

function selectPatient(nr) {
  currentNr = nr;
  localStorage.setItem('zivra_patient', nr);
  var p = ALL_PATIENTS_META.find(function(x){return x.nr===nr;});
  document.getElementById('psAvatar').textContent = p.naam[0];
  document.getElementById('psName').textContent   = p.naam;
  document.getElementById('psId').textContent     = '#'+p.nr;
  document.getElementById('pageTitle').textContent = p.naam+' — Voortgang';
  document.getElementById('pageDesc').textContent  = p.caras+' · '+p.kliniek+' · '+p.zijde+' aangedaan';
  document.querySelectorAll('.ps-item').forEach(function(el){el.classList.toggle('active',el.dataset.nr===nr);});
  // Reset range to all sessions
  var totalSS = (ALL_SESSIONS[nr]||[]).length;
  document.getElementById('fromSessie').value = '1';
  document.getElementById('toSessie').value   = String(totalSS);
  rebuild();
}

document.addEventListener('DOMContentLoaded', function() {
  buildPatientList();
  selectPatient(currentNr);
});
</script>
</body>
</html>
